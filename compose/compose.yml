services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: insuranceops
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      DATABASE_URL: "postgresql+asyncpg://postgres:postgres@postgres:5432/insuranceops"
      REDIS_URL: "redis://redis:6379/0"
      API_KEY_HASH_PEPPER: "dev-pepper-not-for-production"
      ENV: "local"
      PAYLOAD_STORAGE_PATH: "/data/payloads"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: ["python", "-m", "insuranceops.workers.main"]
    environment:
      DATABASE_URL: "postgresql+asyncpg://postgres:postgres@postgres:5432/insuranceops"
      REDIS_URL: "redis://redis:6379/0"
      API_KEY_HASH_PEPPER: "dev-pepper-not-for-production"
      ENV: "local"
      PAYLOAD_STORAGE_PATH: "/data/payloads"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
